version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: prospector_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prospector
      POSTGRES_USER: prospector
      POSTGRES_PASSWORD: ${DB_PASSWORD:-prospector_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prospector -d prospector"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prospector_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
